<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Roleta do Amor ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            color: #d63031;
            text-align: center;
            margin-bottom: 5px;
            font-size: 26px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 20px;
            font-size: 16px;
        }

        #tela-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn-principal {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
            transition: transform 0.2s;
        }

        .btn-principal:hover {
            transform: scale(1.05);
        }

        #conteudo-jogo {
            display: none; 
            width: 100%;
            max-width: 420px;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Container da Roleta e da Seta */
        .roleta-container {
            position: relative;
            width: 340px;
            height: 340px;
            margin: 30px auto;
            user-select: none;
            touch-action: none; /* Impede o scroll da página ao arrastar o dedo na roleta */
        }

        /* Seta Indicadora Superior */
        .seta {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #d63031;
            z-index: 5;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2));
        }

        /* Canvas onde a roleta é desenhada */
        #roleta {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            cursor: grab;
        }

        #roleta:active {
            cursor: grabbing;
        }

        /* Caixa de Resultado do Desafio */
        #resultado {
            margin-top: 20px;
            min-height: 60px;
            background-color: white;
            border: 3px solid #ff7675;
            border-radius: 15px;
            padding: 15px;
            width: 85%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #2d3436;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .ganhou {
            transform: scale(1.05);
            animation: pulsar 0.5s ease alternate infinite;
        }

        @keyframes pulsar {
            from { border-color: #ff7675; }
            to { border-color: #d63031; box-shadow: 0 4px 15px rgba(214, 48, 49, 0.3); }
        }
    </style>
</head>
<body>

    <audio id="musica-fundo" loop preload="auto" src="JeTAime.mp3"></audio>
    <audio id="som-clique" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"></audio>

    <div id="tela-inicial">
        <h1 style="margin-bottom: 25px;">Prontos para girar? ❤️</h1>
        <button class="btn-principal" onclick="iniciarJogo()">Começar</button>
    </div>

    <div id="conteudo-jogo">
        <h1>Roleta do Amor ❤️</h1>
        <p>Passe o dedo ou arraste a roleta para girar!</p>
        
        <div class="roleta-container">
            <div class="seta"></div>
            <canvas id="roleta" width="400" height="400"></canvas>
        </div>

        <div id="resultado">Gire a roleta para descobrir o desafio... 🔥</div>
    </div>

    <script>
        const desafios = [
            "Tire uma peça de roupa 🔞",
            "Massagem de 3 minutos 💆‍♂️",
            "Beijo de cinema (30s) 💋",
            "Posição que você mais gosta 🔥",
            "Tome um gole da bebida 🥂",
            "1 min de silêncio + carinho 🤫",
            "De conchinha sacana 😉",
            "Sussurre um desejo secreto 💬"
        ];

        // Cores alternadas românticas para os setores da roleta
        const cores = ["#ff7675", "#d63031", "#ff8a8a", "#c23616", "#e84118", "#ff4d4d", "#b32424", "#ff6b6b"];

        const canvas = document.getElementById('roleta');
        const ctx = canvas.getContext('2d');
        const resultadoDiv = document.getElementById('resultado');
        const musicaFundo = document.getElementById('musica-fundo');
        const somClique = document.getElementById('som-clique');

        musicaFundo.volume = 0.3;
        somClique.volume = 0.6;

        let anguloAtual = 0;
        let velocidadeRotacao = 0;
        let estaArrastando = false;
        let anguloInicialMouse = 0;
        let ultimosAngulos = [];
        let idAnimacao;

        function iniciarJogo() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('conteudo-jogo').style.display = 'flex';
            
            tocarMusica();
            desenharRoleta();
            registrarEventos();
            atualizarFisica();
        }

        function tocarMusica() {
            musicaFundo.play().catch(() => {
                document.addEventListener('click', function triggerAudio() {
                    musicaFundo.play();
                    document.removeEventListener('click', triggerAudio);
                }, { once: true });
            });
        }

        // Desenha a roleta no Canvas dividida em fatias perfeitas
        function desenharRoleta() {
            const qtdSetores = desafios.length;
            const tamanhoSetor = (2 * Math.PI) / qtdSetores;
            const centro = canvas.width / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < qtdSetores; i++) {
                const anguloSetor = anguloAtual + (i * tamanhoSetor);
                
                // Desenha a fatia colorida
                ctx.beginPath();
                ctx.fillStyle = cores[i % cores.length];
                ctx.moveTo(centro, centro);
                ctx.arc(centro, centro, centro - 5, anguloSetor, anguloSetor + tamanhoSetor);
                ctx.lineTo(centro, centro);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Desenha o texto do desafio dentro da fatia
                ctx.save();
                ctx.translate(centro, centro);
                ctx.rotate(anguloSetor + tamanhoSetor / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 13px 'Segoe UI', sans-serif";
                
                // Encurta textos muito longos para caber na fatia se necessário
                let texto = desafios[i];
                if(texto.length > 25) texto = texto.substring(0,22) + "...";
                
                ctx.fillText(texto, centro - 25, 5);
                ctx.restore();
            }

            // Círculo central estético (Eixo da Roleta)
            ctx.beginPath();
            ctx.arc(centro, centro, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#ff7675';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Coraçãozinho no centro exato
            ctx.fillStyle = '#d63031';
            ctx.font = "18px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("❤️", centro, centro + 1);
        }

        // Retorna o ângulo absoluto baseado na posição do toque em relação ao centro da roleta
        function obterAnguloDoToque(e) {
            const rect = canvas.getBoundingClientRect();
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const clienteY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clienteX - rect.left - rect.width / 2;
            const y = clienteY - rect.top - rect.height / 2;
            return Math.atan2(y, x);
        }

        function registrarEventos() {
            // Unifica eventos de Mouse (Desktop) e Touch (Mobile)
            const iniciarArrasto = (e) => {
                estaArrastando = true;
                velocidadeRotacao = 0;
                resultadoDiv.classList.remove('ganhou');
                resultadoDiv.innerText = "Girando... 🔥";
                anguloInicialMouse = obterAnguloDoToque(e) - anguloAtual;
                ultimosAngulos = [{ tempo: Date.now(), angulo: anguloAtual }];
            };

            const movendoArrasto = (e) => {
                if (!estaArrastando) return;
                
                const anguloDoToque = obterAnguloDoToque(e);
                anguloAtual = anguloDoToque - anguloInicialMouse;
                
                // Registra posições recentes para calcular a velocidade ao soltar
                ultimosAngulos.push({ tempo: Date.now(), angulo: anguloAtual });
                if (ultimosAngulos.length > 5) ultimosAngulos.shift();

                desenharRoleta();
            };

            const finalizarArrasto = () => {
                if (!estaArrastando) return;
                estaArrastando = false;

                if (ultimosAngulos.length < 2) return;
                
                // Calcula a velocidade do arremesso baseado nos últimos movimentos registrados
                const primeiro = ultimosAngulos[0];
                const ultimo = ultimosAngulos[ultimosAngulos.length - 1];
                const dt = (ultimo.tempo - primeiro.tempo) / 1000; // em segundos
                
                if (dt > 0) {
                    velocidadeRotacao = (ultimo.angulo - primeiro.angulo) / dt;
                    // Limita a velocidade máxima para não quebrar a física do giro
                    const velMaxima = 45;
                    velocidadeRotacao = Math.max(-velMaxima, Math.min(velMaxima, velocidadRotacao));
                }
            };

            canvas.addEventListener('mousedown', iniciarArrasto);
            canvas.addEventListener('mousemove', movendoArrasto);
            window.addEventListener('mouseup', finalizarArrasto);

            canvas.addEventListener('touchstart', iniciarArrasto, { passive: true });
            canvas.addEventListener('touchmove', movendoArrasto, { passive: true });
            window.addEventListener('touchend', finalizarArrasto);
        }

        // Loop de animação que processa a inércia e desaceleração progressiva da roleta
        function atualizarFisica() {
            if (!estaArrastando && Math.abs(velocidadeRotacao) > 0.01) {
                anguloAtual += velocidadeRotacao * 0.016; // Aproximação de 60fps
                velocidadeRotacao *= 0.965; // Coeficiente de atrito/frenagem mecânica natural

                // Toca pequenos estalos mecânicos de som enquanto a roleta passa pelas fatias
                if (Math.abs(velocidadeRotacao) > 1 && Math.floor(anguloAtual * 4) % 2 === 0) {
                    somClique.currentTime = 0;
                    somClique.play().catch(() => {});
                }

                desenharRoleta();

                // Quando a roleta para quase por completo
                if (Math.abs(velocidadeRotacao) <= 0.01) {
                    velocidadeRotacao = 0;
                    exibirResultado();
                }
            }
            idAnimacao = requestAnimationFrame(atualizarFisica);
        }

        // Calcula matematicamente qual desafio caiu baseado na seta de cima (ângulo -90° ou -PI/2)
        function exibirResultado() {
            const qtdSetores = desafios.length;
            const tamanhoSetor = (2 * Math.PI) / qtdSetores;

            // Normaliza o ângulo acumulado para mantê-lo na escala entre 0 e 2*PI
            let anguloNormalizado = (-anguloAtual - Math.PI / 2) % (2 * Math.PI);
            if (anguloNormalizado < 0) anguloNormalizado += (2 * Math.PI);

            const indiceGanhador = Math.floor(anguloNormalizado / tamanhoSetor) % qtdSetores;
            
            resultadoDiv.innerText = desafios[indiceGanhador];
            resultadoDiv.classList.add('ganhou');

            // Toca um som de confirmação mais nítido ao parar
            somClique.currentTime = 0;
            somClique.play().catch(() => {});
        }
    </script>
</body>
</html>
