<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Jogo do Amor ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #d63031;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        p {
            color: #4a4a4a;
            text-align: center;
            margin-bottom: 25px;
            font-size: 16px;
        }

        /* Tela de Início Obrigatória para o Áudio Funcionar */
        #tela-inicial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe3e3 0%, #fbc2eb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .btn-jogar {
            background-color: #d63031;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);
            transition: transform 0.2s;
        }

        .btn-jogar:hover {
            transform: scale(1.05);
        }

        #conteudo-jogo {
            display: none; /* Escondido até o clique inicial */
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
        }

        /* Estrutura 3D da Carta */
        .card {
            height: 150px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .card-front {
            background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
            color: white;
            font-size: 40px;
            font-weight: bold;
            border: 3px solid #fff;
        }

        .card-back {
            background-color: white;
            color: #2d3436;
            transform: rotateY(180deg);
            font-size: 16px;
            font-weight: 600;
            border: 3px solid #ff7675;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <audio id="musica-fundo" loop src="JeTAime.mp3"></audio>
    <audio id="som-clique" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"></audio>

    <div id="tela-inicial">
        <h1 style="margin-bottom: 20px;">Prontos para jogar? ❤️</h1>
        <button class="btn-jogar" onclick="iniciarJogo()">Começar</button>
    </div>

    <div id="conteudo-jogo">
        <h1>Nosso Jogo do Amor ❤️</h1>
        <p>Escolha uma carta por vez e cumpra o desafio...</p>
        <div class="grid-container" id="grid"></div>
    </div>

    <script>
        const desafios = [
            "Tire uma peça de roupa 🔞",
            "Me faça uma massagem de 3 minutos 💆‍♂️",
            "Dê um beijo de cinema de 30 segundos 💋",
            "Posição: Do jeitinho que você mais gosta 🔥",
            "Tome um gole da sua bebida 🥂",
            "Fique sem falar por 1 minuto enquanto ganha carinho 🤫",
            "Posição: De conchinha (mas com segundas intenções) 😉",
            "Sussurre um desejo secreto no meu ouvido 💬"
        ];

        desafios.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('grid');
        const musicaFundo = document.getElementById('musica-fundo');
        const somClique = document.getElementById('som-clique');

        // Configura o volume inicial (0.0 a 1.0)
        musicaFundo.volume = 0.4; // Música de fundo mais baixa
        somClique.volume = 0.8;   // Efeito de clique mais nítido

        function iniciarJogo() {
            // Esconde a tela inicial e mostra o jogo
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('conteudo-jogo').style.display = 'flex';
            
            // Tenta reproduzir a música de fundo
            musicaFundo.play().catch(error => console.log("Erro ao tocar música:", error));
        }

        desafios.forEach((desafio) => {
            const card = document.createElement('div');
            card.classList.add('card');
            
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">❤️</div>
                    <div class="card-back">${desafio}</div>
                </div>
            `;

            card.addEventListener('click', function() {
                // Toca o som do clique (reinicia o tempo para tocar imediatamente caso clique rápido)
                somClique.currentTime = 0;
                somClique.play().catch(error => console.log("Erro ao tocar som:", error));
                
                this.classList.toggle('flipped');
            });

            grid.appendChild(card);
        });
    </script>
</body>
</html>
